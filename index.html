<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tiếng Anh Học Đường</title>
  <link rel="stylesheet" href="style.css?v=20260782">
  <script src="script.js?v=202607182" defer></script>
</head>
<body class="min-h-screen">

  <div id="app" class="min-h-screen flex flex-col">

    <!-- ===== Header (glass) ===== -->
    <header class="glass sticky">
      <div class="container py-3 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="text-2xl">🎓</div>
          <div>
            <h1 class="text-lg font-bold text-primary-700 leading-tight">Tiếng Anh Học Đường</h1>
            <p class="text-xs text-gray-400 leading-tight hidden sm:block">Luyện tập giao tiếp mỗi ngày</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="darkModeToggle" class="text-base text-gray-400 hover:text-amber-500 px-2 py-1 rounded-lg hover:bg-amber-50 transition-all cursor-pointer select-none" title="Chế độ tối">🌙</button>
          <button id="resetDataBtn" class="text-xs text-gray-400 hover:text-red-500 px-2 py-1 rounded-lg hover:bg-red-50 transition-all cursor-pointer select-none" title="Đặt lại dữ liệu gốc">🔄 Reset</button>
        </div>
      </div>
    </header>

    <!-- ===== Content ===== -->
    <div class="flex-1 w-full max-w-6xl mx-auto px-4 py-5 safe-bottom">

      <!-- ── Class Selection View ── -->
      <div id="classView" class="animate-fade-in">
        <div class="text-center mb-6">
          <h2 class="text-xl font-bold text-gray-800">Chọn Lớp</h2>
          <p class="text-sm text-gray-400 mt-1">Chọn lớp học để bắt đầu luyện tập</p>
        </div>
        <div id="classList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
      </div>

      <!-- ── Home View (Lesson list) ── -->
      <div id="homeView" class="hidden animate-fade-in">
        <div id="homeHeader" class="flex items-center justify-between mb-4"></div>
        <div id="conversationList" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
      </div>

      <!-- ── Mode Select View ── -->
      <div id="modeSelectView" class="hidden animate-fade-in">
        <div id="modeSelectContent"></div>
      </div>

      <!-- ── Practice View ── -->
      <div id="practiceView" class="hidden animate-fade-in">
        <div id="practiceContent"></div>
      </div>

      <!-- ── Vocabulary View ── -->
      <div id="vocabView" class="hidden animate-fade-in">
        <div id="vocabContent"></div>
      </div>

      <!-- ── Writing View ── -->
      <div id="writingView" class="hidden animate-fade-in">
        <div id="writingContent"></div>
      </div>

      <!-- ── Speak Fast View ── -->
      <div id="speakFastView" class="hidden animate-fade-in">
        <div id="speakFastContent"></div>
      </div>

      <!-- ── Player View ── -->
      <div id="playerView" class="hidden animate-fade-in">
        <div id="playerContent"></div>
      </div>

      <!-- ── Roleplay View ── -->
      <div id="roleplayView" class="hidden animate-fade-in">
        <div id="roleplayContent"></div>
      </div>

      <!-- ── Review View ── -->
      <div id="reviewView" class="hidden animate-fade-in">
        <div id="reviewContent"></div>
      </div>

      <!-- ── Stats View ── -->
      <div id="statsView" class="hidden animate-fade-in">
        <div id="statsContent"></div>
      </div>

    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer class="text-center py-4 text-sm text-gray-400 border-t border-gray-100">
    Tiếng Anh Học Đường — English for School Students
  </footer>

</body>
</html>
